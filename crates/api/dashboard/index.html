<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prospero — Fleet</title>
    <!-- Inline favicon so the browser doesn't request (and 404 on) /favicon.ico. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ccircle cx='8' cy='8' r='7' fill='%23c792ea'/%3E%3C/svg%3E"
    />
    <style>
      :root { color-scheme: light dark; --sp-1: 4px; --sp-2: 6px; --sp-3: 10px; --sp-4: 14px; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #0f1115;
        color: #d7dae0;
      }
      header {
        padding: 12px 18px;
        border-bottom: 1px solid #232733;
        display: flex;
        align-items: baseline;
        gap: 12px;
      }
      header h1 { font-size: 16px; margin: 0; color: #8ab4f8; }
      header .sub { color: #6b7280; font-size: 12px; }
      main { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 49px); }
      #fleet { overflow-y: auto; border-right: 1px solid #232733; padding: 0 12px 12px; }
      #fleet-head { display: flex; justify-content: space-between; align-items: center;
                    position: sticky; top: 0; z-index: 3; background: #0f1115;
                    padding: 12px 0 8px; }
      #stream { overflow-y: auto; padding: 0; }
      #stream-log { padding: 12px; white-space: pre-wrap; }
      #stream-head { display: flex; align-items: center; gap: var(--sp-3);
                     position: sticky; top: 0; z-index: 2; background: #0f1115;
                     padding: 8px 12px; border-bottom: 1px solid #1c2029; }
      .sh-name { color: #8ab4f8; font-weight: 600; }
      .sh-meta { color: #6b7280; font-size: 11px; }
      .sh-conn { margin-left: auto; font-size: 10px; }
      .sh-conn.live { color: #6bd968; }
      .sh-conn.closed { color: #ef5350; }
      .sh-back { display: none; font: 11px ui-monospace, monospace; padding: 2px 8px;
                 border-radius: 6px; border: 1px solid #2d3340; background: #1b1f27; color: #9aa0aa; cursor: pointer; }
      .empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
               min-height: 50vh; gap: 6px; color: #6b7280; }
      .empty-title { color: #9aa0aa; font-size: 13px; }
      .empty-hint { font-size: 11px; }
      .repo { margin-bottom: 16px; }
      .repo-head .name { color: #c792ea; font-weight: 600; }
      .repo > .health { font-size: 11px; }
      .repo > .sources { font-size: 11px; color: #6b7280; }
      .health.healthy { color: #6bd968; }
      .health.unreachable { color: #ef5350; }
      .agent {
        display: flex; justify-content: space-between; gap: var(--sp-2);
        padding: var(--sp-2) var(--sp-3); margin: var(--sp-2) 0; border-radius: 7px;
        background: #171a21; cursor: pointer; border: 1px solid transparent;
      }
      .agent:hover { border-color: #2d3340; }
      .agent.selected { border-color: #8ab4f8; }
      .agent .id { color: #9aa0aa; font-size: 11px; }
      .badge { font-size: 10px; padding: 1px 6px; border-radius: 999px; background: #2d3340; }
      .badge.running { background: #1f3d2b; color: #6bd968; }
      .badge.idle { background: #3a3320; color: #e0c56b; }
      .badge.done, .badge.killed, .badge.failed, .badge.crashed { background: #3a2424; color: #ef9a9a; }
      .wt { font-size: 10px; color: #6b7280; }
      .ev { padding: 1px 0; }
      .ev .k { color: #8ab4f8; }
      .ev .tool { color: #c792ea; }
      .ev .out { color: #d7dae0; }
      .ev .fin { color: #6bd968; }
      .muted { color: #6b7280; }
      /* --- agent timeline (#5) --- */
      .tl-init { color: #9aa0aa; padding: 4px 0 8px; border-bottom: 1px solid #1c2029; margin-bottom: 8px; }
      .tl-init .k { color: #8ab4f8; }
      .tl-tool { background: #171a21; border: 1px solid #232733; border-radius: 6px; margin: 4px 0; }
      .tl-tool-h { display: flex; align-items: center; gap: 8px; padding: 5px 8px; cursor: pointer; }
      .tl-tool-h:hover { background: #1b1f27; }
      .tl-tool-h .tool { color: #c792ea; }
      .tl-input { margin: 0; padding: 8px; border-top: 1px solid #232733; color: #aab;
                  font-size: 12px; white-space: pre-wrap; overflow-x: auto; }
      .tl-pill { margin-left: auto; font-size: 10px; padding: 1px 7px; border-radius: 999px; background: #2d3340; }
      .tl-pill.ok { background: #1f3d2b; color: #6bd968; }
      .tl-pill.fail { background: #3a2424; color: #ef9a9a; }
      .tl-pill.run { background: #3a3320; color: #e0c56b; }
      .tl-out { color: #d7dae0; white-space: pre-wrap; margin: 6px 0 0; }
      .tl-status { font-size: 11px; padding: 2px 0; }
      .tl-fin { margin-top: 10px; padding-top: 8px; border-top: 1px solid #1c2029; color: #6bd968; }
      /* --- control-plane additions --- */
      .hidden { display: none; }
      .fleet-label { color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
      .banner { background: #3a2424; color: #ef9a9a; border: 1px solid #5a3030; border-radius: 6px;
                padding: 6px 10px; margin-bottom: 10px; font-size: 12px; cursor: pointer; }
      .ctl-btn { font: 11px ui-monospace, monospace; padding: 3px 9px; border-radius: 6px;
                 border: 1px solid #2d3340; background: #1b1f27; color: #aab; cursor: pointer; }
      .ctl-btn:hover { border-color: #3a4256; }
      .ctl-btn.primary { background: #1f2a44; color: #8ab4f8; border-color: #2d3a5a; }
      .ctl-btn:disabled { opacity: .5; cursor: default; }
      .ctl-btn.launch { margin: 6px 0; }
      .repo-head { display: flex; justify-content: space-between; align-items: center;
                   position: sticky; top: 44px; z-index: 2; background: #0f1115; padding: 4px 0; }
      .act-btn { font: 10px ui-monospace, monospace; padding: 1px 7px; border-radius: 5px;
                 border: 1px solid #2d3340; background: #1b1f27; color: #9aa0aa; cursor: pointer; }
      .act-btn:hover { border-color: #3a4256; }
      .act-btn.danger { color: #ef9a9a; border-color: #3a2424; }
      .act-btn:disabled { opacity: .5; cursor: default; }
      .agent-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
      .acts { display: flex; gap: var(--sp-1); opacity: .4; transition: opacity .1s; }
      .agent:hover .acts, .agent:focus-within .acts, .agent.selected .acts { opacity: 1; }
      .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.55);
               display: flex; align-items: flex-start; justify-content: center; z-index: 50; }
      .modal { margin-top: 80px; width: 340px; background: #13161c; border: 1px solid #3a4256;
               border-radius: 10px; padding: 14px; box-shadow: 0 12px 40px rgba(0,0,0,.6); }
      /* The k8s config editor's sources/provider rows need more room. */
      .modal.wide { width: min(640px, 92vw); }
      .form-title { color: #8ab4f8; font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
                    margin-bottom: 10px; }
      .fl { display: block; font-size: 11px; color: #9aa0aa; margin-bottom: 8px; }
      .in { display: block; width: 100%; margin-top: 3px; background: #0f1115; border: 1px solid #2d3340;
            border-radius: 5px; color: #d7dae0; padding: 5px 7px; font: 12px ui-monospace, monospace; }
      textarea.in { resize: vertical; }
      .chk { display: block; font-size: 12px; color: #aab; margin-bottom: 8px; }
      .adv-toggle { color: #6b7280; font-size: 11px; cursor: pointer; margin-bottom: 8px; }
      .form-err { color: #ef9a9a; font-size: 11px; min-height: 14px; margin-bottom: 6px; }
      .form-actions { display: flex; justify-content: flex-end; gap: 8px; }
      .repo-head .gear { font: 11px ui-monospace, monospace; padding: 1px 6px; border-radius: 5px;
                         border: 1px solid #2d3340; background: #1b1f27; color: #9aa0aa; cursor: pointer; }
      .repo-head .gear:hover { border-color: #3a4256; }
      .repo-head-actions { display: flex; gap: var(--sp-1); opacity: .5; transition: opacity .1s; }
      .repo-head:hover .repo-head-actions, .repo-head:focus-within .repo-head-actions { opacity: 1; }
      .meta { color: #6b7280; font-size: 10px; }
      .env-row { display: flex; gap: 6px; margin-bottom: 6px; }
      .env-row .in { margin-top: 0; }
      .env-row button { font: 11px ui-monospace, monospace; border: 1px solid #3a2424; background: #1b1f27;
                        color: #ef9a9a; border-radius: 5px; cursor: pointer; padding: 0 8px; }
      .env-add { font: 11px ui-monospace, monospace; color: #8ab4f8; cursor: pointer; }
      /* --- k8s config plane (#143) --- */
      .repo > .ws-status { font-size: 11px; }
      .ws-status.ready { color: #6bd968; }
      .ws-status.reconciling, .ws-status.pending { color: #e0c56b; }
      .ws-status.failed { color: #ef5350; cursor: help; }
      .cfg-section-label { font-size: 10px; color: #9aa0aa; margin: 10px 0 4px;
                           text-transform: uppercase; letter-spacing: .05em; }
      .cfg-rows { display: flex; flex-direction: column; gap: 6px; }
      .cfg-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .cfg-row .in { margin-top: 0; flex: 1 1 90px; min-width: 80px; }
      .cfg-row .rm { font: 11px ui-monospace, monospace; border: 1px solid #3a2424; background: #1b1f27;
                     color: #ef9a9a; border-radius: 5px; cursor: pointer; padding: 2px 8px; }
      .cfg-row .prov-def { display: flex; align-items: center; gap: 3px; font-size: 11px;
                           margin-bottom: 0; white-space: nowrap; flex: 0 0 auto; }
      .agent-input { display: flex; gap: 6px; margin: 4px 0 8px; }
      .agent-input .in { margin-top: 0; flex: 1; }
      .agent-input button { font: 10px ui-monospace, monospace; padding: 2px 8px; border-radius: 5px;
                            border: 1px solid #2d3a5a; background: #1f2a44; color: #8ab4f8; cursor: pointer; }
      .agent-input button.end { background: #1b1f27; color: #9aa0aa; border-color: #2d3340; }
      @media (max-width: 720px) {
        main { grid-template-columns: 1fr; }
        #fleet { border-right: none; }
        #stream { display: none; }
        body.show-stream #fleet { display: none; }
        body.show-stream #stream { display: block; }
        .sh-back { display: inline-block; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Prospero</h1>
      <span class="sub">fleet control plane · <span id="host">…</span></span>
    </header>
    <main>
      <section id="fleet">
        <div id="fleet-head">
          <span class="fleet-label" id="fleet-count">fleet</span>
          <button id="add-repo-btn" class="ctl-btn">＋ add workspace</button>
        </div>
        <div id="banner" class="banner hidden"></div>
        <div id="fleet-list"><div class="muted">loading fleet…</div></div>
      </section>
      <section id="stream">
        <div id="stream-head" class="hidden"></div>
        <div id="stream-log"></div>
      </section>
    </main>
    <div id="modal-root" class="modal-root hidden"></div>
    <script src="/app.js"></script>
  </body>
</html>
