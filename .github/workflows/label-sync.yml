name: Sync labels
on:
  push:
    branches: [main]
    paths: ['.github/labels.yml']
  workflow_dispatch:
permissions:
  issues: write
  contents: read
jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2.3.3
        with:
          config-file: .github/labels.yml
          delete-other-labels: true
          token: ${{ secrets.GITHUB_TOKEN }}
