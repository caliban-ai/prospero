name: Add to Kanban board
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]
jobs:
  add-to-project:
    runs-on: ubuntu-latest
    # Skip PRs opened from forks: they cannot read the project secret.
    if: >-
      github.event_name == 'issues' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/add-to-project@v2.0.0
        with:
          project-url: https://github.com/orgs/caliban-ai/projects/1
          github-token: ${{ secrets.KANBAN_PROJECT_PAT }}
