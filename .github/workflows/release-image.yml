name: release-image
on:
  pull_request:
    paths: ["Dockerfile", ".dockerignore", "Cargo.toml", "Cargo.lock", "crates/**", ".github/workflows/release-image.yml"]
  push:
    tags: ["v*"]
  workflow_dispatch:
concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/caliban-ai/prospero
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
      - name: Build (PR — amd64, no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: ghcr.io/caliban-ai/prospero:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push (tag — multi-arch)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
