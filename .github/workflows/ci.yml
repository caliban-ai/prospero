name: ci

on:
  # Run on every PR so the required status check always reports. Whether the
  # expensive cargo steps actually run is decided per-PR by the `changes` step
  # below — docs-only PRs skip them and the job still goes green.
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The workspace integration tests (core/api/cli) need prospero-core's testkit
# feature to compile, so every cargo step enables it.
env:
  TESTKIT: "--features prospero-core/testkit"

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      code: ${{ steps.changes.outputs.code }}

    # Postgres backend tests (PostgresStore/PostgresConfigStore) are gated on
    # DATABASE_URL; this service makes them actually run in CI.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prospero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Skip the cargo steps on docs-only PRs (the job still succeeds, so a
      # required check always reports).
      - name: Detect non-docs changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only \
               "${{ github.event.pull_request.base.sha }}" \
               "${{ github.event.pull_request.head.sha }}" \
             | grep -vqE '^(docs/|.*\.md$|LICENSE$)'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        if: steps.changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        if: steps.changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        if: steps.changes.outputs.code == 'true'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: steps.changes.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets $TESTKIT -- -D warnings

      - name: cargo build
        if: steps.changes.outputs.code == 'true'
        run: cargo build --workspace --all-targets $TESTKIT

      - name: cargo test
        if: steps.changes.outputs.code == 'true'
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/prospero_test
        run: cargo test --workspace $TESTKIT

      - name: Docs-only change — Rust CI skipped
        if: steps.changes.outputs.code != 'true'
        run: echo "Only docs/markdown/license changed; skipping cargo fmt/clippy/build/test."

  coverage:
    name: line-coverage gate
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    # Same Postgres service as `check`: the coverage run executes the tests under
    # llvm-cov, so the gated Postgres tests must run here too or coverage drops.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prospero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # llvm-tools-preview provides llvm-cov / llvm-profdata, which cargo-llvm-cov
      # drives (on CI via rustup; locally a Homebrew toolchain sets LLVM_COV /
      # LLVM_PROFDATA instead — see scripts/coverage.sh).
      - name: Install Rust toolchain
        if: needs.check.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo registry & target
        if: needs.check.outputs.code == 'true'
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        if: needs.check.outputs.code == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      # scripts/coverage.sh is the single entrypoint: it writes the LCOV + JSON
      # reports, then fails when line coverage drops below COVERAGE_MIN. Reports
      # are written before the gate, so the comment/summary steps still run on a
      # failing run (via !cancelled()).
      - name: Run coverage gate
        if: needs.check.outputs.code == 'true'
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/prospero_test
        run: scripts/coverage.sh
      - name: Render coverage report
        if: ${{ !cancelled() && needs.check.outputs.code == 'true' }}
        run: |
          python3 scripts/coverage-report.py target/llvm-cov/coverage.json \
            --commit "${{ github.sha }}" --floor 85 --target 85 > coverage-comment.md
          cat coverage-comment.md >> "$GITHUB_STEP_SUMMARY"
      # Post/update a single sticky comment on PRs (skipped for forks, whose
      # GITHUB_TOKEN is read-only).
      - name: Post coverage comment
        if: ${{ !cancelled() && needs.check.outputs.code == 'true' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: coverage-comment.md
      - name: Upload coverage reports
        if: ${{ !cancelled() && needs.check.outputs.code == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            target/llvm-cov/lcov.info
            target/llvm-cov/coverage.json
          if-no-files-found: error
      - name: Docs-only change — coverage skipped
        if: needs.check.outputs.code != 'true'
        run: echo "Only docs/markdown/license changed; skipping coverage."
